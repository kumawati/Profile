<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visi Kami</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #334155;
            text-align: center;
        }

        .main-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
            padding: 30px 20px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .main-header h1 {
            margin: 0;
            font-size: 24px;
        }

        /* Wadah Kartu Visi */
        .vision-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .vision-card {
            background-color: white;
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .vision-card .icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .vision-card h2 {
            margin: 0 0 15px 0;
            color: #0f766e;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        /* Gaya teks utama visi */
        .vision-text {
            font-size: 16px;
            line-height: 1.6;
            color: #475569;
            font-style: italic;
            font-weight: 500;
        }

        /* Tombol Kembali */
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            background-color: #0f766e;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .btn-back:active {
            background-color: #115e59;
        }
    </style>
</head>
<body>

    <!-- 1. Header Atas -->
    <div class="main-header">
        <h1>🎯 Visi Media Pembelajaran</h1>
    </div>

    <!-- 2. Konten Utama Visi -->
    <div class="vision-container">
        <div class="vision-card">
            <span class="icon">✨</span>
            <h2>VISI</h2>
            
            <!-- Silakan ganti kalimat di bawah ini dengan Visi yang kamu inginkan -->
            <p class="vision-text">
                "Menjadi media pembelajaran interaktif berbasis web yang unggul, adaptif, dan menyenangkan guna mendukung efektivitas belajar mandiri bagi siswa di era digital."
            </p>
            
            <!-- Tombol Kembali ke Halaman Utama -->
            <a href="index.html" class="btn-back">⬅ Kembali ke Menu</a>
        </div>
    </div>

</body>
</html>
