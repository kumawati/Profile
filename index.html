<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Pembelajaran Digital</title>
    <style>
        /* Mengatur dasar halaman dengan konsep minimalis modern */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc; /* Warna latar belakang abu-abu terang yang bersih */
            color: #334155;
            text-align: center;
        }

        /* Bagian Header dengan Gradasi Warna Teal/Hijau Toska Modern */
        .main-header {
            background: linear-gradient(135deg, #0f766e, #14b8a6); 
            color: white;
            padding: 40px 20px;
            border-bottom-left-radius: 24px; /* Membuat sudut bawah melengkung elegan */
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 15px rgba(15, 118, 110, 0.15);
        }
        .main-header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        .main-header p {
            margin: 8px 0 0 0;
            font-size: 13px;
            opacity: 0.9;
        }

        /* Wadah untuk tombol menu */
        .navigation-grid {
            padding: 40px 20px;
            max-width: 400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Membagi menu menjadi 2 kolom grid yang rapi */
            gap: 16px; /* Jarak antar tombol */
        }

        /* Gaya untuk Tombol Baru berbentuk Kotak Melengkung Modern (Card Style) */
        .menu-card {
            background-color: white;
            color: #0f766e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 20px 10px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Efek saat tombol ditekan/disentuh */
        .menu-card:active {
            background-color: #f1f5f9;
            transform: scale(0.98);
        }

        /* Icon Emoji diperbesar sedikit */
        .menu-card span {
            font-size: 22px;
        }

        /* Footer bawah yang simpel */
        .simple-footer {
            margin-top: 40px;
            font-size: 11px;
            color: #94a3b8;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <!-- 1. Header Atas (Konsep Baru: Rounded Gradient) -->
    <div class="main-header">
        <h1>🚀 Media Pembelajaran Interaktif</h1>
        <p>Eksplorasi materi pembelajaran secara mandiri dan terstruktur.</p>
    </div>

    <!-- 2. Menu Utama (Konsep Baru: 2x2 Grid Layout) -->
    <div class="navigation-grid">
        <a href="Materi.html" class="menu-card">
            <span>📚</span> Materi
        </a>
        <a href="Profil.html" class="menu-card">
            <span>👤</span> Profil
        </a>
        <a href="Visi.html" class="menu-card">
            <span>🎯</span> Visi
        </a>
        <a href="Misi.html" class="menu-card">
            <span>📌</span> Misi
        </a>
    </div>

    <!-- 3. Footer Bawah -->
    <div class="simple-footer">
        © 2026 Pengembangan Media Interaktif
    </div>

</body>
</html>
